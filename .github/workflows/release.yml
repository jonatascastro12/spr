name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: gw-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: gw-linux-arm64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: gw-darwin-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: gw-darwin-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Build
        run: bun build src/cli.ts --compile --minify --bytecode --target=${{ matrix.target }} --outfile ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          chmod +x artifacts/gw-*
          if gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            gh release upload "$TAG" artifacts/gw-* \
              --repo "${{ github.repository }}" \
              --clobber
          else
            gh release create "$TAG" artifacts/gw-* \
              --repo "${{ github.repository }}" \
              --title "$TAG" \
              --generate-notes
          fi
